<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial PRO Full</title>

<style>
body{font-family:Arial;background:#0b1c2c;color:#fff;padding:10px}
.container{max-width:420px;margin:auto}
.card{background:#122f44;padding:15px;border-radius:15px;margin-bottom:10px}
select,button{width:100%;padding:10px;border-radius:10px;border:none;margin-top:5px}
button{background:#00e5ff;color:#000;font-weight:bold}
.result{background:#071923;padding:15px;border-radius:15px;margin-top:10px}
h2{text-align:center;color:#00e5ff}
</style>

</head>
<body>

<div class="container">
<h2>Celestial PRO</h2>

<div class="card">
<button onclick="getGPS()">📡 Ambil GPS</button>
</div>

<div class="card">
<label>Latitude</label>
<select id="latDeg"></select>
<select id="latMin"></select>
<select id="latDir"><option>N</option><option>S</option></select>

<label>Longitude</label>
<select id="lonDeg"></select>
<select id="lonMin"></select>
<select id="lonDir"><option>E</option><option>W</option></select>
</div>

<div class="card">
<label>Star</label>
<select id="star">
<option value="hadar">Hadar</option>
<option value="sirius">Sirius</option>
</select>
</div>

<button onclick="calc()">🚀 CALCULATE</button>

<div class="result" id="out"></div>

</div>

<script>

// ===== INIT =====
function fill(id,start,end,step=1,dec=0){
let el=document.getElementById(id);
for(let i=start;i<=end;i+=step){
let opt=document.createElement('option');
opt.value=i;
opt.text=i.toFixed(dec);
el.appendChild(opt);
}}
fill('latDeg',0,89);
fill('latMin',0,59,0.1,1);
fill('lonDeg',0,179);
fill('lonMin',0,59,0.1,1);

// ===== STAR DATA =====
const stars={
hadar:{name:"Hadar",sha:148,dec:-60},
sirius:{name:"Sirius",sha:259,dec:-16.7}
};

// ===== GPS =====
function getGPS(){
navigator.geolocation.getCurrentPosition(p=>{
let lat=p.coords.latitude;
let lon=p.coords.longitude;

let latD=Math.floor(Math.abs(lat));
let latM=(Math.abs(lat)-latD)*60;

let lonD=Math.floor(Math.abs(lon));
let lonM=(Math.abs(lon)-lonD)*60;

latDeg.value=latD;
latMin.value=latM.toFixed(1);
latDir.value=lat>=0?'N':'S';

lonDeg.value=lonD;
lonMin.value=lonM.toFixed(1);
lonDir.value=lon>=0?'E':'W';
});
}

// ===== HELPER =====
function lat(){
let d=latDeg.value,m=latMin.value;
let v=parseFloat(d)+(parseFloat(m)/60);
return latDir.value==='S'?-v:v;
}
function lon(){
let d=lonDeg.value,m=lonMin.value;
let v=parseFloat(d)+(parseFloat(m)/60);
return lonDir.value==='W'?-v:v;
}

// ===== JULIAN =====
function julian(d){
return (d/86400000)+2440587.5;
}

// ===== GHA ARIES =====
function ghaAries(JD){
let T=(JD-2451545.0)/36525;
let GMST=280.46061837+360.98564736629*(JD-2451545)+0.000387933*T*T;
GMST%=360;
if(GMST<0)GMST+=360;
return GMST;
}

// ===== GHA SUN =====
function ghaSun(JD){
let n=JD-2451545.0;
let L=(280.460+0.9856474*n)%360;
let g=(357.528+0.9856003*n)%360;
let lambda=L+1.915*Math.sin(g*Math.PI/180);
let gha=(lambda+180)%360;
return gha;
}

// ===== MAIN =====
function calc(){

let LAT=lat();
let LON=lon();

let now=new Date();
let JD=julian(now.getTime());

let ghaA=ghaAries(JD);
let ghaS=ghaSun(JD);

let lhaS=ghaS+LON;
if(lhaS>360)lhaS-=360;

// ===== STAR =====
let star=stars[starSelect()];
let ghaStar=(ghaA+star.sha)%360;

let lha=ghaStar-LON;
if(lha<0)lha+=360;

// ===== HC =====
let latR=LAT*Math.PI/180;
let decR=star.dec*Math.PI/180;
let lhaR=lha*Math.PI/180;

let hc=Math.asin(
Math.sin(latR)*Math.sin(decR)+
Math.cos(latR)*Math.cos(decR)*Math.cos(lhaR)
)*180/Math.PI;

// ===== AZIMUTH =====
let z=Math.acos(
(Math.sin(decR)-Math.sin(latR)*Math.sin(hc*Math.PI/180))/
(Math.cos(latR)*Math.cos(hc*Math.PI/180))
)*180/Math.PI;

// ===== OUTPUT =====
out.innerHTML=`
UTC: ${now.getUTCHours()}:${now.getUTCMinutes()}<br><br>

GHA Aries: ${ghaA.toFixed(2)}°<br>
GHA Sun: ${ghaS.toFixed(2)}°<br>
LHA Sun: ${lhaS.toFixed(2)}°<br><br>

⭐ ${star.name}<br>
GHA Star: ${ghaStar.toFixed(2)}°<br>
LHA Star: ${lha.toFixed(2)}°<br>
Hc: ${hc.toFixed(2)}°<br>
Zn: ${z.toFixed(2)}°<br>
`;
}

// helper
function starSelect(){
return document.getElementById('star').value;
}

</script>

</body>
</html>
