<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Encoder Tool</title>
</head>
<body>

<h2>HTML Encoder (Mr. Wahid)</h2>

<textarea id="input" placeholder="Paste HTML kamu di sini..." style="width:100%;height:200px;"></textarea>
<br><br>
<button onclick="encode()">ENCODE</button>

<h3>Hasil:</h3>
<textarea id="output" style="width:100%;height:200px;"></textarea>

<script>
function encode(){
    const input = document.getElementById("input").value;
    const encoded = btoa(unescape(encodeURIComponent(input)));

    const result = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Protected App</title>
</head>
<body>

<script>
(function(){
const data = "${encoded}";
const decode = decodeURIComponent(escape(atob(data)));

setTimeout(()=>{
document.open();
document.write(decode);
document.close();
}, 200);
})();
<\/script>

</body>
</html>
    `;

    document.getElementById("output").value = result;
}
</script>

</body>
</html>
